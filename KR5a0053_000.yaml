front:
  text: 太上洞淵北帝天蓬護命消災神呪妙經元始天尊在香林園內與諸天童子説法演戒既畢時於塵中有一童子名曰廣善越班而出前進作禮上白天尊今日侍座得聞明真科律二十四條善惡因緣受報之因大衆歡喜各生讃歎證無上乘更無餘滯又蒙開示罪緣拔度齋法救濟幽魂長夜之苦上升福堂衣食自然其法弘普死者咸賴然今見世及來生男女未見經誡或氣力薄弱不堪受持復無捍難多為世間衆邪惡鬼橫來侵害夭折壽命不終天年天尊既開大慈之化生死俱濟存亡荷恩唯願哀憐更示來生男女防身護命之法令得免離見世三災九橫五瘟七疰疾病毒氣衆邪魍魎諸厄之難令其性命無有中傷如蒙哀愍仰荷聖恩於是天尊歡喜答曰善哉善哉子之所請亦為至要吾愍一切衆生如母念子今當為説汝等諦聽堅持勿忘爾時大衆欣喜一切聽受天尊曰往昔過去人民淳朴無有惡心任命短長終其天壽無有夭枉鬼不橫傷但今來時代澆薄人心破壞更相疑惑互為彼此不信正法唯有邪行背真向偽不正於道違天逆地攻根伐本不忠不孝無慈愍心欺誘萬民酷虐百姓殺戮衆生殘害物命結諸𡨚對無量無邊致使今生男女動見患難或為劫賊之所傷害或為惡鬼之所加害或官私口舌無故滅身或蛇虺虎狼百蟲毒螫之所害傷或官厄之災無故橫生閉在牢獄鞭杖屠刑或復家遭瘟疾身染毒氣大小疾病人口死亡六親斷絶骨肉離散諸餘此等蓋緣三天氣絶六天氣行人鬼不分邪正未别所以有幽囚之氣慘怛之氣邪魅之氣妖淫之氣妄侵生人傳成疫癘於是幽囚之氣自一而生從北而起一以生二慘怛相仍二以生三邪魅攻伐腎衰心耗肺絶肝枯黃雲不凝黑白相背六天邪魔故來侵害八部鬼神妄來絶滅欲得開度當知六天門名持天蓬大呪正心定念微妙思惟見諸大神始絶故氣身安神泰自此而生門户興隆自此而致於是玉音振發顯説六天宫名第一宫名休明總靈洞天宫第二宫名元司重正宗靈天宫第三宫名統仙升靈希菀天宫第四宫名正真邵靈菀司天宫第五宫名雲樓玉紀明元天宫第六宫名崇靈赤映雲曲天宫如是天宫在北方壬癸之山羅酆之境北隂神君總統其上旁列宫室鬼神所司內奉六天隂陽網紀外制六天羅酆幽境賞功罰罪無失亳分一念正真六宫善開一念邪欲六宫惡開雖是邪氣流行亦自人心所召斬滅惡根當須靜心持念六天門名北向稽首神靈欽從不敢肆害爾時廣善童子與諸大衆閬是説巳心大歡喜再進作禮上白天尊臣等靜悟道緣巳經纍劫但知奉行道念收斂一心下觀人間每金癘疫苦害生人顛倒沈迷無有解脫雖切衷愍不知有如是因緣如是厲氣肆毒世間今蒙開諭曠劫未聞生世種親知有持守知有皈向無邊利益仰戴元恩六天宫名巳銘金簡天蓬大呪靜念聽受爾時天尊瓊顏妙感真念遐張善哉廣善大呪因緣禁戒甚重吾今相付實因愍念下方開度群品若吾金口敷演天地震肅神靈拜迎五律自新人天當慶於是左顧勑左元真人於大有之庭啓紫陽雲錦之笈出是大呪宣付法衆廣善童子得受大呪心生踴躍即於座中廣聲誦詠呪曰天蓬天蓬九元煞童五丁都司髙刁北公七政八靈太上浩凶長顱巨獸手把帝鍾素裊三神嚴駕𧃍龍咸劎神王斬邪滅蹤紫氣乘天丹霞赫衝吞魔食鬼橫身飲風蒼舌緣齒四目老翁天丁力士威南禦凶天騶激戾威北銜鋒三十萬兵衛我九重劈尸千里掃却不祥敢有小鬼欲來見狀钁天大斧斬鬼五形炎帝烈血北帝然骨四明破骸天猷滅類神刀一下萬鬼自潰急急如北帝明威口勑律令誦呪既巳大衆方切讃歎夙緣慶幸得遇隱名俄頃之間東方有諸大神雲霞散綵乘空步虛或持旌節或執戈矛或踏八卦神龜或持三天火印龍虎翊衛鐘鼓交嗚流光輝煥徑詣道場作諸法音振響空界旋繞道前再拜懇請臣等昧道清虛稟生震地陽剛受任純精結形名號天蓬上輔玉帝分司梵境下臨泉淵整隊元皇總制六天惟以馘毒為專何緣今日紅光滿空照耀廣宇飛揚隱字下及小臣所部之域臣等驚怖未省所因是以尋光上詣願求開釋天尊肯首趨徐而答善哉大將隂陽結氣男女媾精有生道有死道有人道有鬼道生則成人死則成鬼生死殊途性理惟一蓋因造作報應不同吾與諸天童子演説威禁科要論次生死因緣見諸世間六天浸毒邪氣流行正道不生邪念永結淪沈告海流浪愛河一神所虧百邪侵尅五神顛倒三宫閉塞五帝不遊塵埃靈宅肌肉不生魂神考貴疾病纏綿痛毒難忍是可悲哀推心憫惻惟汝諸神輔衛北帝感能伏衆威能蕩邪立地安天有大功德是以泄萬劫之禁宣付真諱告諸童子流傳世暗永今持誦假汝威德下降棄賢降伏衆魔消蕩祅凶掃諸穢毒保令清肅汝今部從既到道場更當付囑世間男女淫欲纒縳殺害拘囚妄想貪生愛惡自賊殊不知妄從真出真自妄移一妾既生萬祅縱孽吾今委付汝當分别攝邪歸正用正降邪凡諸世間若有善男子善女人遭陽九百六之災三裘八難九橫五苦之厄精邪毒氣疫癘屯殃誦大神呪汝當尋聲赴感救度衰危使致康寧保終天年輔道行化是時廣善童子仰聞天尊付囑至童即於座中再拜而起敷白四衆天蓬大將親奉慈顏神念敷陳威德廣備有是神力能度衆生我等同聞實深慶幸若人啓請而説頌曰
