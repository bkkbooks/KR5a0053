body:
  text: 稽首皈命天蓬將摧碎群魔大力神嚴駕𧃍龍降道場赫奕威光動天地二十八宿明星主三十六部大神王手持神劔斬妖邪掌握寶印戮精魅钁斧劈破諸地獄帝鐘搖振徹天宫飛雷掣電走風雲巨天甲卒持戈戟南斗火官除毒害北帝水神滅災殃降伏六天大鬼王掃蕩十方諸疫氣忿怒日月失精光呼吸山河皆鼎沸紫氣乘天下徘徊三十萬兵密加備爾時説頌既畢天樂玄音空中自振飛花散香無量數衆與天蓬大將部從威神各各稽首大道几前同聲讃詠慈雲廣布惠澤退宣誓願流傳化度群品作禮奉辭而退太上洞淵北帝天蓬護命消災神呪妙經
